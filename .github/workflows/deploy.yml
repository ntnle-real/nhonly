name: Deploy to nhon-ly.org

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Restart app
        run: |
          launchctl stop org.nhonly.app
          sleep 1
          launchctl start org.nhonly.app

      - name: Verify deployment
        run: |
          sleep 3
          curl -sf http://localhost:3000 > /dev/null && echo "✓ App is responding"
